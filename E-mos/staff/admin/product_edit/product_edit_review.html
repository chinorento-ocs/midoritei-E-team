<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>商品変更 - 確認</title>
  <link rel="stylesheet" href="../../styles/style.css">
</head>
<body>
  <main class="content">
    <div class="page-card">
      <div class="header-title">商品変更 — 確認</div>

      <div class="form-row">
        <label>変更前</label>
        <div class="list-box" id="beforeBox">--</div>
      </div>

      <div class="form-row">
        <label>変更後</label>
        <input class="input-text" id="afterInput" type="text" value="">

      <div class="actions">
        <button type="button" class="btn" id="backToSelect">戻る</button>
        <button type="button" class="btn btn-primary" id="toEdit">次へ</button>
      </div>
    </div>
  </main>

  <script src="product_edit_review.js" defer></script>
