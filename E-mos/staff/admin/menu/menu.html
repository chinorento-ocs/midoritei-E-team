<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>社員用メニュー - みどり亭</title>
  <link rel="stylesheet" href="../../styles/style.css">
</head>
<body>
  <header class="top">
  </header>

  <main class="content">
    <div class="page-card" role="main">
      <button class="gear" id="gearBtn" aria-label="ログアウト" title="ログアウト">⚙</button>
      <div class="heading">
        <p class="brand">みどり亭</p>
        <p class="subtitle">メニュー管理システム<br>社員用</p>
      </div>

      <nav class="button-list">
        <button class="menu-button" data-target="../product_add/product_add.html">商品追加</button>
        <button class="menu-button" data-target="../product_delete/product_delete.html">商品削除</button>
        <button class="menu-button" data-target="../product_edit/product_edit_select.html">商品変更</button>
        <button class="menu-button" data-target="../../parttime/menu/menu.html">アルバイト用</button>
      </nav>
    </div>
  </main>

  <!-- 確認モーダル -->
  <div id="confirmModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-content">
        <h2 id="confirmTitle">ログアウトしますか？</h2>
        <div class="modal-actions">
          <button id="cancelBtn">いいえ</button>
          <button id="okBtn">はい</button>
        </div>
      </div>
    </div>
  </div>

  <script src="menu.js" defer></script>
</body>
</html>
